---
- name: Remove Domain DKIM Setup
  hosts: all
  become: true
  vars:
    mail_domain: "{{ target_domain }}"
    selector: "relay"

  tasks:
    - name: "CRITICAL SAFETY: Abort if mail_domain is empty"
      ansible.builtin.fail:
        msg: "The variable 'mail_domain' is empty. Task aborted to prevent wiping the /keys/ directory!"
      when: mail_domain is not defined or mail_domain | length == 0

    - name: Remove the specific domain folder
      ansible.builtin.file:
        # We explicitly define the full path to the sub-folder
        path: "/var/lib/opendkim/keys/{{ mail_domain }}"
        state: absent
      # Extra safety: ensure we aren't accidentally trying to delete the parent
      when: mail_domain != "" and mail_domain != "/"

    - name: Remove entry from SigningTable
      ansible.builtin.lineinfile:
        path: /etc/opendkim/SigningTable
        regexp: ".*@{{ mail_domain | replace('.', '\\.') }}.*"
        state: absent

    - name: Remove entry from KeyTable
      ansible.builtin.lineinfile:
        path: /etc/opendkim/KeyTable
        regexp: "^{{ selector }}\\._domainkey\\.{{ mail_domain | replace('.', '\\.') }}.*"
        state: absent

    - name: Remove domain from TrustedHosts block
      ansible.builtin.blockinfile:
        path: /etc/opendkim/TrustedHosts
        marker: "# {mark} ANSIBLE MANAGED BLOCK {{ mail_domain }}"
        block: ""
        state: absent

    - name: Restart OpenDKIM
      ansible.builtin.service:
        name: opendkim
        state: restarted

    - name: Restart Postfix
      ansible.builtin.service:
        name: postfix
        state: restarted
